version: 2

models:
  - name: stg_yellow_trips
    description: "Staging layer for raw yellow taxi trip data - passthrough with column cleaning. Data quality filtering applied at intermediate layer."
    columns:
      - name: pickup_datetime
        description: "Trip pickup timestamp"
        tests:
          - not_null
      - name: dropoff_datetime
        description: "Trip dropoff timestamp"
        tests:
          - not_null
      - name: pu_location_id
        description: "Pickup location ID"
        tests:
          - not_null
      - name: do_location_id
        description: "Dropoff location ID"
        tests:
          - not_null
      - name: trip_distance
        description: "Trip distance in miles"
        tests:
          - not_null
      - name: tip_amount
        description: "Tip amount in USD"
        tests:
          - not_null

  - name: stg_taxi_zones
    description: "Staging layer for taxi zone dimension with cleaned columns"
    columns:
      - name: location_id
        description: "Unique zone identifier"
        tests:
          - unique
          - not_null
      - name: borough
        description: "NYC borough name"
        tests:
          - not_null
      - name: zone
        description: "Zone name within borough"
        tests:
          - not_null
      - name: service_zone
        description: "Service zone category"
        tests:
          - not_null