version: 2

sources:
  - name: raw
    description: "Raw source data from NYC taxi data warehouse"
    tables:
      - name: raw_yellow_trips
        description: "Raw yellow taxi trip records"
        loaded_at_field: tpep_pickup_datetime
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        columns:
          - name: tpep_pickup_datetime
            description: "Trip pickup timestamp"
          - name: tpep_dropoff_datetime
            description: "Trip dropoff timestamp"
          - name: passenger_count
            description: "Number of passengers"
          - name: trip_distance
            description: "Trip distance in miles"
          - name: fare_amount
            description: "Fare amount in USD"
          - name: tip_amount
            description: "Tip amount in USD"